name: Refresh Dashboard

on:
  schedule:
    # Every Monday at 9:00 AM Eastern Time (14:00 UTC)
    - cron: '0 14 * * 1'
  workflow_dispatch:   # Allow manual trigger from GitHub Actions UI

permissions:
  contents: write      # Needed to commit updated index.html back to the repo

jobs:
  refresh:
    name: Fetch Notion data & redeploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch data from Notion and update index.html
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: python fetch_notion.py

      - name: Commit and push updated dashboard
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          # Only commit if index.html actually changed
          if git diff --staged --quiet; then
            echo "No changes to commit — dashboard is already up to date."
          else
            git commit -m "chore: refresh dashboard data $(date -u '+%Y-%m-%d')"
            git push
          fi
